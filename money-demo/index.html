<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f4f1ec">
<title>명진앱 · 가계부 (목업)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;color:#2b2621;background:#f4f1ec;max-width:460px;margin:0 auto;min-height:100vh;padding:calc(env(safe-area-inset-top) + 30px) 16px 110px}
.demo-badge{position:fixed;right:14px;top:calc(env(safe-area-inset-top) + 10px);z-index:60;font-size:10px;font-weight:700;color:#b5745c;background:#f3e2da;padding:5px 10px;border-radius:20px}
.hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.wm{font-size:14px;font-weight:800;color:#c98e7f}.sync{font-size:10.5px;color:#9fb08f;font-weight:700;background:#eef2e9;padding:3px 9px;border-radius:20px}
.h1{font-size:24px;font-weight:800;letter-spacing:-.5px;padding:0 4px}
/* 기간 토글 */
.period{display:flex;gap:5px;background:#e9e3d8;border-radius:12px;padding:4px;margin:14px 4px 12px}
.period button{flex:1;border:none;background:none;font-size:12.5px;font-weight:700;color:#948a7d;padding:8px 2px;border-radius:9px;cursor:pointer}
.period button.on{background:#fff;color:#2b2621;box-shadow:0 2px 6px rgba(0,0,0,.07)}
/* 월 네비 + 요약 */
.nav{display:flex;align-items:center;justify-content:center;gap:16px;margin:4px 0 12px}
.nav .a{font-size:20px;color:#a99e8f;cursor:pointer;padding:2px 8px}
.nav .m{font-size:15px;font-weight:800}
.sum{display:flex;gap:8px;margin:0 4px 14px}
.sbox{flex:1;background:#fff;border:1px solid #ece7df;border-radius:13px;padding:11px 8px;text-align:center}
.sbox .l{font-size:10.5px;color:#a99e8f;font-weight:600}.sbox .v{font-size:15px;font-weight:800;margin-top:3px}
.v.in{color:#5f8b6a}.v.out{color:#b5564b}.v.net{color:#2b2621}
/* 캘린더 */
.cal{background:#fff;border:1px solid #ece7df;border-radius:16px;padding:12px 8px;margin:0 4px}
.wk{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10.5px;color:#b3a89b;font-weight:700;margin-bottom:6px}
.wk .sun{color:#cf8a8a}.wk .sat{color:#8aa0cf}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cell{min-height:48px;border-radius:9px;padding:4px 2px 3px;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.cell .d{font-size:11px;font-weight:600;color:#7a7169}
.cell.sun .d{color:#cf8a8a}.cell.sat .d{color:#8aa0cf}.cell.off .d{color:#d5cec2}
.cell.today{background:#f3e2da}.cell.sel{background:#e7eee2;outline:2px solid #a3bd90}
.cell .in{font-size:8.5px;font-weight:800;color:#5f8b6a;line-height:1.25}
.cell .out{font-size:8.5px;font-weight:800;color:#c0665a;line-height:1.25}
/* 선택일 상세 */
.day{margin:16px 4px 0}
.dayh{font-size:13px;font-weight:800;margin-bottom:9px;color:#5a534a}
.led{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ece7df;border-radius:13px;padding:12px 13px;margin-bottom:8px;cursor:pointer}
.lic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:0 0 auto}
.lt{flex:1;min-width:0}.ln{font-size:14px;font-weight:600}.ld{font-size:11px;color:#a99e8f;margin-top:2px}
.la{font-weight:800;font-size:14px}.la.out{color:#b5564b}.la.in{color:#5f8b6a}
/* 기간 요약(3/6/12) */
.mrow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ece7df;border-radius:13px;padding:12px 14px;margin:0 4px 8px}
.mm{font-size:13px;font-weight:700;flex:0 0 62px}
.mbar{flex:1;height:8px;background:#eee7db;border-radius:8px;overflow:hidden;display:flex}
.mbar .bi{background:#a3bd90}.mbar .bo{background:#d99a90}
.mnet{font-size:12.5px;font-weight:800;flex:0 0 auto}
/* 상세 모달 */
.ov{position:fixed;inset:0;background:rgba(30,25,20,.4);z-index:70;opacity:0;pointer-events:none;transition:.25s}
.ov.on{opacity:1;pointer-events:auto}
.modal{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(110%);width:min(460px,100vw);background:#f4f1ec;border-radius:22px 22px 0 0;z-index:80;transition:transform .28s;padding:24px 22px calc(env(safe-area-inset-bottom) + 26px)}
.modal.on{transform:translateX(-50%) translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh .t{font-size:18px;font-weight:800}.mh .c{font-size:22px;color:#a99e8f;cursor:pointer}
.mamt{font-size:30px;font-weight:800;text-align:center;margin:6px 0 18px}
.mamt.out{color:#b5564b}.mamt.in{color:#5f8b6a}
.drow{display:flex;justify-content:space-between;padding:12px 2px;border-bottom:1px solid #e8e1d5;font-size:14px}
.drow .k{color:#a99e8f;font-weight:600}.drow .v{font-weight:700}
/* 탭바 */
.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(460px,100vw);background:rgba(255,255,255,.96);border-top:1px solid #ebe5db;display:flex;padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);z-index:50}
.tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:#b3ab9f}
.tab .ic{font-size:19px}.tab .lb{font-size:10px;font-weight:700}.tab.on{color:#c98e7f}
.add{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 78px);width:52px;height:52px;border-radius:50%;background:#c98e7f;color:#fff;border:none;font-size:26px;box-shadow:0 6px 18px rgba(160,110,90,.4);z-index:55}
</style></head><body>
<span class="demo-badge">목업</span>
<div class="hd"><div class="wm">maydly · 명진앱</div><div class="sync">☁ 동기화</div></div>
<div class="h1">가계부</div>

<div class="period">
  <button class="on" data-p="1" onclick="setP(this)">월간</button>
  <button data-p="3" onclick="setP(this)">3개월</button>
  <button data-p="6" onclick="setP(this)">6개월</button>
  <button data-p="12" onclick="setP(this)">12개월</button>
</div>

<div id="monthly">
  <div class="nav"><span class="a">‹</span><span class="m">2026년 7월</span><span class="a">›</span></div>
  <div class="sum">
    <div class="sbox"><div class="l">수입</div><div class="v in">+320만</div></div>
    <div class="sbox"><div class="l">지출</div><div class="v out">−145만</div></div>
    <div class="sbox"><div class="l">남음</div><div class="v net">+175만</div></div>
  </div>
  <div class="cal">
    <div class="wk"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="day">
    <div class="dayh" id="dayh">7월 10일 (금) · 내역</div>
    <div id="daylist"></div>
  </div>
</div>

<div id="ranged" style="display:none">
  <div class="nav"><span class="a">‹</span><span class="m" id="rlabel">2026년 · 최근 3개월</span><span class="a">›</span></div>
  <div class="sum">
    <div class="sbox"><div class="l">수입</div><div class="v in" id="rin">+0</div></div>
    <div class="sbox"><div class="l">지출</div><div class="v out" id="rout">−0</div></div>
    <div class="sbox"><div class="l">남음</div><div class="v net" id="rnet">+0</div></div>
  </div>
  <div id="mlist"></div>
</div>

<!-- 상세 모달 -->
<div class="ov" id="ov" onclick="closeM()"></div>
<div class="modal" id="modal">
  <div class="mh"><div class="t" id="mtitle">내역 상세</div><div class="c" onclick="closeM()">×</div></div>
  <div class="mamt" id="mamt">−8만</div>
  <div class="drow"><span class="k">분류</span><span class="v" id="mcat">장비</span></div>
  <div class="drow"><span class="k">날짜</span><span class="v" id="mdate">2026-07-09</span></div>
  <div class="drow"><span class="k">메모</span><span class="v" id="mmemo">렌즈 필터 · 머스트컬러</span></div>
</div>

<button class="add">+</button>
<div class="tabs">
  <button class="tab"><span class="ic">📋</span><span class="lb">할 일</span></button>
  <button class="tab"><span class="ic">🛒</span><span class="lb">구매계획</span></button>
  <button class="tab"><span class="ic">📦</span><span class="lb">보유현황</span></button>
  <button class="tab on"><span class="ic">💰</span><span class="lb">가계부</span></button>
</div>
<script>
// 샘플 내역 (만원)
var ENT=[
  {date:'2026-07-10',type:'in',name:'최혜주님 촬영비',cat:'촬영수입',amt:35,memo:'스튜디오 2시간',ic:'📷',bg:'#e7eee2'},
  {date:'2026-07-10',type:'out',name:'촬영 후 식사',cat:'식비',amt:4,memo:'스태프 포함',ic:'🍽',bg:'#eee9e0'},
  {date:'2026-07-09',type:'out',name:'렌즈 필터 구입',cat:'장비',amt:8,memo:'렌즈 필터 · 머스트컬러',ic:'🛒',bg:'#f6e3df'},
  {date:'2026-07-05',type:'in',name:'야외 촬영비',cat:'촬영수입',amt:28,memo:'가족 촬영',ic:'📷',bg:'#e7eee2'},
  {date:'2026-07-02',type:'out',name:'스튜디오 월세',cat:'고정비',amt:60,memo:'7월분',ic:'🏠',bg:'#f6e3df'}
];
var MONTHS=[ // 기간 요약용 샘플
  {m:'2026-07',in:320,out:145},{m:'2026-06',in:290,out:160},{m:'2026-05',in:310,out:120},
  {m:'2026-04',in:260,out:180},{m:'2026-03',in:340,out:150},{m:'2026-02',in:230,out:110}
];
var selDay='2026-07-10';
function won(n){return n+'만'}
function buildCal(){
  var y=2026,mo=7,first=new Date(y,mo-1,1).getDay(),days=new Date(y,mo,0).getDate();
  var byDay={};ENT.forEach(function(e){(byDay[e.date]=byDay[e.date]||{in:0,out:0})[e.type]+=e.amt});
  var h='';
  for(var i=0;i<first;i++)h+='<div class="cell off"></div>';
  for(var d=1;d<=days;d++){
    var ds=y+'-07-'+(d<10?'0'+d:d),dow=(first+d-1)%7,cls='cell'+(dow===0?' sun':dow===6?' sat':'')+(ds===selDay?' sel':'')+(d===11?' today':'');
    var b=byDay[ds];
    h+='<div class="'+cls+'" onclick="selectDay(\''+ds+'\',this)"><span class="d">'+d+'</span>'
      +(b&&b.in?'<span class="in">+'+b.in+'</span>':'')
      +(b&&b.out?'<span class="out">-'+b.out+'</span>':'')+'</div>';
  }
  document.getElementById('grid').innerHTML=h;
}
function selectDay(ds,el){
  selDay=ds;document.querySelectorAll('.cell').forEach(function(c){c.classList.remove('sel')});if(el)el.classList.add('sel');
  var day=ds.split('-')[2].replace(/^0/,''),wd=['일','월','화','수','목','금','토'][new Date(ds).getDay()];
  document.getElementById('dayh').textContent='7월 '+day+'일 ('+wd+') · 내역';
  var list=ENT.filter(function(e){return e.date===ds});
  document.getElementById('daylist').innerHTML= list.length? list.map(function(e){
    return '<div class="led" onclick=\'openM('+JSON.stringify(e).replace(/'/g,"&#39;")+')\'><div class="lic" style="background:'+e.bg+'">'+e.ic+'</div>'
      +'<div class="lt"><div class="ln">'+e.name+'</div><div class="ld">'+e.cat+'</div></div>'
      +'<div class="la '+e.type+'">'+(e.type==='in'?'+':'−')+e.amt+'만</div></div>';
  }).join('') : '<div style="color:#b3a89b;text-align:center;padding:18px 0;font-size:13px">이 날은 내역이 없어요</div>';
}
function openM(e){
  document.getElementById('mtitle').textContent=e.name;
  var a=document.getElementById('mamt');a.textContent=(e.type==='in'?'+':'−')+e.amt+'만';a.className='mamt '+e.type;
  document.getElementById('mcat').textContent=e.cat;
  document.getElementById('mdate').textContent=e.date;
  document.getElementById('mmemo').textContent=e.memo;
  document.getElementById('modal').classList.add('on');document.getElementById('ov').classList.add('on');
}
function closeM(){document.getElementById('modal').classList.remove('on');document.getElementById('ov').classList.remove('on');}
function setP(btn){
  document.querySelectorAll('.period button').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');
  var p=+btn.getAttribute('data-p');
  if(p===1){document.getElementById('monthly').style.display='';document.getElementById('ranged').style.display='none';return;}
  document.getElementById('monthly').style.display='none';document.getElementById('ranged').style.display='';
  var ms=MONTHS.slice(0,p),ti=0,to=0,max=1;
  ms.forEach(function(m){ti+=m.in;to+=m.out;max=Math.max(max,m.in,m.out)});
  document.getElementById('rlabel').textContent='2026년 · 최근 '+p+'개월';
  document.getElementById('rin').textContent='+'+ti+'만';document.getElementById('rout').textContent='−'+to+'만';document.getElementById('rnet').textContent='+'+(ti-to)+'만';
  document.getElementById('mlist').innerHTML=ms.map(function(m){
    var mm=m.m.split('-')[1].replace(/^0/,'')+'월';
    return '<div class="mrow"><div class="mm">'+mm+'</div><div class="mbar"><div class="bi" style="width:'+(m.in/max*50)+'%"></div><div class="bo" style="width:'+(m.out/max*50)+'%"></div></div><div class="mnet">+'+(m.in-m.out)+'만</div></div>';
  }).join('');
}
buildCal();selectDay('2026-07-10');
</script>
</body></html>
