<style>

8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(270)'%2F%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E");color:#2e2a26;font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased}
body{max-width:460px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 46px) 20px calc(env(safe-area-inset-bottom) + 50px)}

/* 헤더 */
.head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.wm{font-size:31px;font-weight:800;letter-spacing:-.7px}
.wm .d{color:#4f9a6a}
.who{font-size:12px;color:#a99e8f;padding-bottom:5px}

/* 4열 타일 그리드 (폰 기준) */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{position:relative;text-decoration:none;color:#fff;border-radius:16px;padding:9px;aspect-ratio:1/1;
  display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;
  box-shadow:0 5px 13px rgba(90,70,50,.14);transition:transform .16s,box-shadow .16s}
.tile:active{transform:scale(.96)}
@media(hover:hover){.tile:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(90,70,50,.22)}}
.tile .ic{font-size:21px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.42);border-radius:13px;box-shadow:0 2px 7px rgba(70,60,45,.13), inset 0 0 0 1px rgba(255,255,255,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.tile .lb{font-size:11px;font-weight:750;letter-spacing:-.3px;line-height:1.15;text-shadow:0 1px 3px rgba(0,0,0,.12)}
.tile .sm{font-size:8px;opacity:.86;margin-top:1px;font-weight:500;line-height:1.25;text-shadow:0 1px 2px rgba(0,0,0,.1);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile .arw{position:absolute;top:8px;right:9px;font-size:10px;opacity:.65}
.tile.wide{grid-column:1/-1;aspect-ratio:auto;flex-direction:row;align-items:center;gap:15px;padding:18px 20px}
.tile.wide .ic{font-size:29px}
.tile.wide .wtx{flex:1;min-width:0}
.tile.wide .arw{position:static;opacity:.75}
.tile.soon{opacity:.62}
.tile .soonbadge{position:absolute;top:15px;right:14px;font-size:10px;font-weight:700;background:rgba(255,255,255,.32);
  padding:3px 9px;border-radius:20px;backdrop-filter:blur(4px)}
.foot{text-align:center;margin-top:24px;font-size:11.5px;color:#a99e8f;line-height:1.6}

/* PIN 게이트 */
.gate{position:fixed;inset:0;background:#f0f6ef url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'112'%20height%3D'112'%3E%3Cg%20fill%3D'%234f9a6a'%20fill-opacity%3D'0.035'%3E%3Cg%20transform%3D'translate(28%2C28)'%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(0)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(90)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(180)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(270)'%2F%3E%3C%2Fg%3E%3Cg%20transform%3D'translate(84%2C86)'%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(0)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(90)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(180)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(270)'%2F%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E");z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
.gate .gw{font-size:34px;font-weight:800;letter-spacing:-.8px}
.gate .gw .d{color:#4f9a6a}
.gate .gs{font-size:13px;color:#a2988c;margin-top:-4px}
.pinrow{display:flex;gap:9px;margin-top:8px;width:100%;max-width:320px}
.pin{flex:1;min-width:0;font-size:18px;text-align:center;letter-spacing:6px;
  padding:14px 16px;border:1.5px solid #e2dace;border-radius:14px;background:#fff;color:#2e2a26;outline:none}
.pin:focus{border-color:#4f9a6a}
.gobtn{flex:0 0 auto;border:none;background:#4f9a6a;color:#fff;font-size:16px;font-weight:700;
  padding:14px 22px;border-radius:14px;cursor:pointer}
.gobtn:active{opacity:.85}
.err{font-size:12.5px;color:#c2564b;min-height:16px}
.toast{position:fixed;left:50%;bottom:38px;transform:translateX(-50%);background:rgba(46,42,38,.9);color:#fff;
  font-size:13px;font-weight:600;padding:11px 18px;border-radius:22px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center}
.toast.on{opacity:1}
</style>
</head>
<body>

<!-- PIN 게이트 -->
<div class="gate" id="gate">
  <div class="gw">maydly<span class="d">.</span></div>
  <div class="gs">개인 허브 · 명진 &amp; 수빈</div>
  <div class="pinrow">
    <input class="pin" id="pin" type="password" inputmode="numeric" pattern="[0-9]*"
      placeholder="PIN" maxlength="8" autocomplete="off" onkeydown="if(event.key==='Enter')tryPin()">
    <button class="gobtn" onclick="tryPin()">입장</button>
  </div>
  <div class="err" id="err"></div>
</div>

<!-- 허브 본문 -->
<div id="app" style="display:none">
  <div class="head"><div class="wm">maydly<span class="d">.</span><svg viewBox="0 0 100 100" width="38" height="38" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="vertical-align:-7px;margin-left:5px"><defs><linearGradient id="gc" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#86d2a0"/><stop offset="0.55" stop-color="#4f9a6a"/><stop offset="1" stop-color="#357a51"/></linearGradient><linearGradient id="gcs" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4f9a6a"/><stop offset="1" stop-color="#2f6a45"/></linearGradient><filter id="gcg" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="3.2" flood-color="#4f9a6a" flood-opacity="0.35"/></filter></defs><path d="M50 55 C53 70 49 80 45 92" stroke="url(#gcs)" stroke-width="3.6" fill="none" stroke-linecap="round"/><g transform="translate(50,53)" fill="url(#gc)" filter="url(#gcg)"><path d="M0 0 C-2.4,-10.5 -17,-15.5 -17,-27.5 C-17,-36.5 -8,-40.5 0,-32.5 C8,-40.5 17,-36.5 17,-27.5 C17,-15.5 2.4,-10.5 0,0 Z"/><path d="M0 0 C-2.4,-10.5 -17,-15.5 -17,-27.5 C-17,-36.5 -8,-40.5 0,-32.5 C8,-40.5 17,-36.5 17,-27.5 C17,-15.5 2.4,-10.5 0,0 Z" transform="rotate(90)"/><path d="M0 0 C-2.4,-10.5 -17,-15.5 -17,-27.5 C-17,-36.5 -8,-40.5 0,-32.5 C8,-40.5 17,-36.5 17,-27.5 C17,-15.5 2.4,-10.5 0,0 Z" transform="rotate(180)"/><path d="M0 0 C-2.4,-10.5 -17,-15.5 -17,-27.5 C-17,-36.5 -8,-40.5 0,-32.5 C8,-40.5 17,-36.5 17,-27.5 C17,-15.5 2.4,-10.5 0,0 Z" transform="rotate(270)"/><circle cx="0" cy="0" r="2.6" fill="#357a51" opacity="0.5"/><path d="M-6,-20 C-9,-26 -6,-31 -1,-31" stroke="#fff" stroke-opacity="0.35" stroke-width="2" fill="none" stroke-linecap="round"/></g></svg></div><div class="who">명진 · 수빈</div></div>
  <div class="grid" id="grid"></div>
  <div class="foot">홈 화면에 추가해 앱처럼 쓰세요<br>명진 · 수빈 전용</div>
</div>

<div class="toast" id="toast"></div>

<script>
// 개인 허브 (타일 · 파스텔 뮤트) — 도구는 각자 자리에, 여기선 링크만.
var LINKS=[
  // 1줄
  {ic:'🌱', g:['#bcd0ac','#a3bd90'], lb:'수빈 앱', sm:'수빈 루틴', url:'https://maydly.github.io/note/subin/'},
  {ic:'🙏', g:['#e6c9a8','#d4ad82'], lb:'수빈 사주', sm:'수빈이 «사줘» 보낸 것 보기', url:'https://maydly.github.io/note/myapp/?tab=wish'},
  {ic:'🖼️', g:['#d9b8c4','#c59db0'], lb:'촬영 시안', sm:'우중·바다·바다커플·새내기', url:'https://maydly.github.io/note/hub/시안/'},
  {ic:'📱', g:['#d3bfe0','#b79bd4'], lb:'명진앱', sm:'할일·구매·보유·가계부', url:'https://maydly.github.io/note/myapp/'},
  // 2줄
  {ic:'🚗', g:['#b7c4d6','#95a7c0'], lb:'수빈 차량', sm:'장기렌트 조사·비교 · 🔒', url:'https://maydly.github.io/note/car/'},
  {ic:'🕐', g:['#e3cf9d','#d0b97e'], lb:'페이용캘린더', sm:'페이 촬영 1시간 타임테이블 · 야외 문의', url:'https://maydly.github.io/maydly-cal/pay.html'},
  {ic:'🍀', g:['#a8d3a0','#7fb877'], lb:'협업캘린더', sm:'협업 고객에게 보낼 링크', url:'https://maydly.github.io/maydly-cal/'},
  {ic:'📅', g:['#e7bcb4','#dda79d'], lb:'예약 캘린더', sm:'촬영 일정 관리(관리자)', url:'https://maydly.github.io/maydly-cal/admin.html'},
  // 3줄
  {ic:'📸', g:['#ecd3ab','#dcbd8d'], lb:'대표 사진맵', sm:'2024–2026 모델 전체 · 토큰 🔒', url:'https://maydly.github.io/note/hub/photomap/'},
  {ic:'🎞️', g:['#e0b9a0','#caa080'], lb:'빈티지 필름', sm:'도감·구매처·재고·셋팅', url:'https://maydly.github.io/note/film/'},
  {ic:'🎥', g:['#a7cdd0','#85b3b7'], lb:'장비 비교자료', sm:'촬영장비 비교', url:'https://maydly.github.io/note/07_장비비교자료/'},
  {ic:'🌿', g:['#bcdcb6','#8ac07d'], lb:'단어 여정', sm:'촬영 전, 오늘의 나 다섯 단어', url:'https://maydly.github.io/maydly-hub/word-journey/'},
  // 4줄
  {ic:'📖', g:['#c3c4e4','#a9abd6'], lb:'note 아카이브', sm:'스터디 노트', url:'https://maydly.github.io/note/'},
  {ic:'✨', g:['#e6b8c8','#d59fb3'], lb:'maydly 시안', sm:'고객에게 보내는 maydly 소개 페이지', url:'https://maydly.github.io/'}
];
var PW_HASH='9923e00231428d5272881c78ed1ffe7340dd73f4792d45ad24b5ab469fcc1a4b';

function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function render(){
  document.getElementById('grid').innerHTML=LINKS.map(function(l){
    var g='linear-gradient(150deg,'+l.g[0]+','+l.g[1]+')';
    if(l.soon){
      return '<a class="tile soon" href="#" onclick="soon(event)" style="background:'+g+'">'
        +'<div class="soonbadge">준비중</div><div class="ic">'+l.ic+'</div>'
        +'<div><div class="lb">'+esc(l.lb)+'</div><div class="sm">'+esc(l.sm)+'</div></div></a>';
    }
    if(l.wide){
      return '<a class="tile wide" href="'+esc(l.url)+'" target="_blank" rel="noopener noreferrer" style="background:'+g+'">'
        +'<div class="ic">'+l.ic+'</div>'
        +'<div class="wtx"><div class="lb">'+esc(l.lb)+'</div><div class="sm">'+esc(l.sm)+'</div></div>'
        +'<div class="arw">↗</div></a>';
    }
    return '<a class="tile" href="'+esc(l.url)+'" target="_blank" rel="noopener noreferrer" style="background:'+g+'">'
      +'<div class="arw">↗</div><div class="ic">'+l.ic+'</div>'
      +'<div><div class="lb">'+esc(l.lb)+'</div><div class="sm">'+esc(l.sm)+'</div></div></a>';
  }).join('');
}
function soon(e){e.preventDefault();toast('대표 사진맵은 곧 연결됩니다');}
var _tt;
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('on');},2200);}
function enter(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='';render();}
function tryPin(){
  var v=document.getElementById('pin').value.trim();
  if(sha256(v)===PW_HASH){try{localStorage.setItem('maydly_hub_session','1');}catch(e){}enter();}
  else{document.getElementById('err').textContent='PIN이 맞지 않습니다.';document.getElementById('pin').value='';document.getElementById('pin').focus();}
}
// 컴팩트 SHA-256 (http/localhost·file 환경에서도 동작)
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),result='',i,j,words=[],abl=ascii.length*8,hash=[],k=[],pc=0,isC={};
  for(var c=2;pc<64;c++){if(!isC[c]){for(i=0;i<313;i+=c)isC[i]=c;hash[pc]=(mp(c,.5)*mw)|0;k[pc++]=(mp(c,1/3)*mw)|0;}}
  ascii+='\x80';while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){j=ascii.charCodeAt(i);if(j>>8)return;words[i>>2]|=j<<((3-i)%4)*8;}
  words[words.length]=((abl/mw)|0);words[words.length]=(abl);
  for(j=0;j<words.length;){var w=words.slice(j,j+=16),oh=hash;hash=hash.slice(0,8);
    for(i=0;i<64;i++){var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+(w[i]=i<16?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;}
    for(i=0;i<8;i++)hash[i]=(hash[i]+oh[i])|0;}
  for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16);}
  return result;
}
