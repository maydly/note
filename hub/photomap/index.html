<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>maydly · 대표 사진맵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#f0f6ef;color:#2a352a;font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px 22px;text-align:center}
.wm{font-size:30px;font-weight:800;letter-spacing:-.6px}
.wm .d{color:#4f9a6a}
.sub{font-size:13px;color:#7a8a78;line-height:1.6;max-width:340px}
.card{background:#fff;border-radius:16px;padding:22px 20px;box-shadow:0 5px 16px rgba(79,120,79,.1);width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
button{font-size:15px;font-weight:700;padding:12px;border:none;border-radius:12px;background:#4f9a6a;color:#fff;cursor:pointer}
.msg{font-size:12.5px;min-height:16px;color:#7a8a78}
.msg.err{color:#c2564b}
.hint{font-size:11.5px;color:#9aa898;line-height:1.6}
</style>
</head>
<body>
<div class="wrap" id="gate">
  <div class="wm">maydly<span class="d">.</span></div>
  <div class="sub">대표 사진맵 — 명진·수빈 전용. 구글 로그인으로 사진을 불러옵니다.</div>
  <div class="card">
    <button onclick="doLogin()">구글로 로그인</button>
    <div class="msg" id="msg"></div>
    <div class="hint">토큰 필요 없어요. 명진·수빈 구글 계정만.</div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBfyRE7CNENjgSfe25xHAdr87gOllpYtvM",authDomain:"subin-routine.firebaseapp.com",projectId:"subin-routine"};
const app=initializeApp(cfg,"pmview"), auth=getAuth(app), db=getFirestore(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});
let manifest=null;
function setMsg(t,cls){ var m=document.getElementById('msg'); if(m){m.textContent=t||''; m.className='msg '+(cls||'');} }
async function loadManifest(){ if(manifest)return manifest; var d=await getDoc(doc(db,'photomap','_manifest')); if(!d.exists())throw new Error('아직 사진이 올라오지 않았어요'); manifest=d.data(); return manifest; }
// 앱이 쓸 월별 읽기 (window 전역 — document.write 후에도 유지)
window.pmReadMonth=async function(mk){ var mf=await loadManifest(); var n=(mf.months||{})[mk]; if(!n)return {}; var parts=[]; for(var i=0;i<n;i++){ var d=await getDoc(doc(db,'photomap',mk+'__'+i)); parts.push((d.exists()&&d.data().d)||''); } return JSON.parse(parts.join('')); };
async function readApp(){ var mf=await loadManifest(); var n=mf.app||0; var parts=[]; for(var i=0;i<n;i++){ var d=await getDoc(doc(db,'photomap','_app__'+i)); parts.push((d.exists()&&d.data().d)||''); } return parts.join(''); }
window.doLogin=async function(){ setMsg('로그인 중…'); try{ await signInWithPopup(auth,new GoogleAuthProvider()); }catch(e){
  if(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request'){ try{ await signInWithRedirect(auth,new GoogleAuthProvider()); }catch(e2){ setMsg('로그인 실패: '+(e2.code||e2.message),'err'); } }
  else setMsg(e.code==='auth/unauthorized-domain'?'이 주소가 Firebase 허용목록에 없어요':'로그인 실패: '+(e.code||e.message),'err'); } };
getRedirectResult(auth).catch(()=>{});
onAuthStateChanged(auth, async (user)=>{
  if(!user)return;
  setMsg('사진맵 불러오는 중…');
  try{ var html=await readApp(); document.open(); document.write(html); document.close(); }
  catch(e){ setMsg(e.message||'불러오기 실패','err'); }
});
</script>
</body>
</html>
